<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数据后台 — AI人格测试</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a0b; --surface:#111114; --surface2:#18181c;
    --border:rgba(255,255,255,0.06); --border-hover:rgba(255,255,255,0.12);
    --text:#e8e5e0; --text-muted:#777773; --text-faint:#3a3a38;
    --accent:#d4a853; --green:#4ec994; --red:#e05a5a; --blue:#5a9ae0; --purple:#9a7ee0;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans SC',sans-serif;font-weight:300;min-height:100vh;}

  #login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;}
  .login-box{width:340px;text-align:center;}
  .login-logo{font-size:11px;letter-spacing:0.2em;color:var(--text-faint);margin-bottom:32px;}
  .login-box h2{font-size:16px;font-weight:400;color:var(--text-muted);margin-bottom:24px;}
  .login-box input{width:100%;background:var(--surface);border:0.5px solid var(--border);color:var(--text);font-family:monospace;font-size:14px;padding:12px 16px;border-radius:8px;text-align:center;outline:none;margin-bottom:10px;}
  .login-box button{width:100%;background:var(--accent);color:#0a0a0b;font-size:13px;font-weight:500;padding:12px;border-radius:8px;border:none;cursor:pointer;}
  .login-err{font-size:12px;color:var(--red);margin-top:8px;}

  #admin-screen{display:none;}
  .admin-header{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;border-bottom:0.5px solid var(--border);flex-wrap:wrap;gap:12px;}
  .admin-header h1{font-size:13px;font-weight:400;letter-spacing:0.08em;color:var(--text-muted);}
  .header-right{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
  .live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
  .last-upd{font-size:11px;color:var(--text-faint);font-family:monospace;}
  .hdr-btn{font-size:11px;color:var(--text-muted);background:none;border:0.5px solid var(--border);padding:5px 12px;border-radius:20px;cursor:pointer;text-decoration:none;display:inline-block;}
  .hdr-btn:hover{border-color:var(--border-hover);color:var(--text);}
  .data-src{font-size:10px;padding:3px 10px;border-radius:20px;border:0.5px solid;}
  .src-sb{color:var(--green);border-color:var(--green);}

  .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);}
  .kpi{background:var(--surface);padding:20px 24px;}
  .kpi-val{font-family:monospace;font-size:32px;font-weight:500;line-height:1;margin-bottom:6px;}
  .kpi-label{font-size:11px;color:var(--text-muted);}
  .kpi-sub{font-size:10px;color:var(--text-faint);margin-top:4px;}
  .green{color:var(--green);} .red{color:var(--red);} .blue{color:var(--blue);} .accent{color:var(--accent);}

  .admin-body{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--border);}
  .panel{background:var(--bg);padding:24px 28px;}
  .panel.full{grid-column:1/-1;}
  .panel.half{grid-column:span 1;}
  .panel-label{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--text-faint);margin-bottom:20px;}

  .funnel-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
  .f-label{font-size:12px;color:var(--text-muted);min-width:84px;}
  .f-track{flex:1;height:8px;background:var(--surface2);border-radius:4px;overflow:hidden;}
  .f-fill{height:100%;border-radius:4px;transition:width 0.5s ease;}
  .f-val{font-size:11px;font-family:monospace;color:var(--text-muted);min-width:80px;text-align:right;}

  .bar-chart{display:flex;align-items:flex-end;gap:4px;height:90px;}
  .bar-col{flex:1;border-radius:3px 3px 0 0;min-height:2px;transition:height 0.5s ease;position:relative;cursor:default;}
  .bar-col:hover::after{content:attr(data-tip);position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:var(--surface2);border:0.5px solid var(--border);color:var(--text);font-size:10px;padding:4px 8px;border-radius:4px;white-space:nowrap;}
  .bar-labels{display:flex;gap:4px;margin-top:5px;}
  .bar-lbl{flex:1;text-align:center;font-size:9px;color:var(--text-faint);}

  .ai-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
  .ai-name{font-size:12px;color:var(--text-muted);min-width:72px;}
  .ai-track{flex:1;height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;}
  .ai-fill{height:100%;border-radius:3px;transition:width 0.5s ease;}

  .share-pills{display:flex;gap:10px;flex-wrap:wrap;}
  .share-pill{background:var(--surface2);border:0.5px solid var(--border);border-radius:12px;padding:12px 16px;text-align:center;min-width:80px;}
  .share-pill-val{font-size:22px;font-weight:500;font-family:monospace;color:var(--accent);}
  .share-pill-lbl{font-size:10px;color:var(--text-faint);margin-top:3px;}

  .hm-row{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
  .hm-q{font-size:10px;color:var(--text-faint);min-width:24px;}
  .hm-seg{height:14px;border-radius:2px;transition:flex 0.5s ease;}

  .sess-table{width:100%;border-collapse:collapse;font-size:12px;font-family:monospace;}
  .sess-table th{text-align:left;font-size:10px;letter-spacing:0.1em;color:var(--text-faint);padding:0 0 10px;font-weight:400;}
  .sess-table td{padding:6px 0;border-top:0.5px solid var(--border);color:var(--text-muted);vertical-align:middle;}
  .badge{display:inline-block;font-size:9px;padding:2px 7px;border-radius:10px;border:0.5px solid;}
  .badge-done{color:var(--green);border-color:var(--green);}
  .badge-drop{color:var(--red);border-color:var(--red);}
  .badge-view{color:var(--text-faint);border-color:var(--text-faint);}

  .analyze-btn{background:none;border:0.5px solid var(--accent);color:var(--accent);font-size:12px;padding:8px 20px;border-radius:20px;cursor:pointer;}
  .analyze-btn:disabled{opacity:0.3;}
  .analysis-box{background:var(--surface);border:0.5px solid var(--border);border-radius:12px;padding:24px;margin-top:16px;display:none;}
  .analysis-text{font-size:14px;line-height:1.9;color:var(--text-muted);white-space:pre-wrap;}

  .iter-item{display:flex;gap:16px;padding:16px 0;border-bottom:0.5px solid var(--border);}
  .iter-dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0;}
  .iter-title{font-size:13px;color:var(--text);margin-bottom:4px;}
  .iter-desc{font-size:12px;color:var(--text-muted);line-height:1.6;}
  .iter-meta{font-size:10px;color:var(--text-faint);margin-top:4px;}

  .empty-state{text-align:center;padding:40px 0;color:var(--text-faint);}

  @media(max-width:900px){.admin-body{grid-template-columns:1fr 1fr;}.kpi-grid{grid-template-columns:1fr 1fr;}}
  @media(max-width:600px){.admin-body{grid-template-columns:1fr;}.kpi-grid{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">AI人格测试 · 数据后台</div>
    <h2>请输入后台密码</h2>
    <input type="password" id="pwd-input" placeholder="••••••••" onkeydown="if(event.key==='Enter')checkPwd()" />
    <button onclick="checkPwd()">进入后台</button>
    <div class="login-err" id="pwd-err"></div>
  </div>
</div>

<div id="admin-screen">
  <div class="admin-header">
    <h1>AI人格测试 · 数据看板</h1>
    <div class="header-right">
      <div class="live-dot"></div>
      <span class="last-upd" id="last-upd">—</span>
      <span class="data-src src-sb" id="data-src-badge">Supabase</span>
      <button class="hdr-btn" onclick="loadData()">刷新</button>
      <a href="index.html" class="hdr-btn">← 测试页</a>
    </div>
  </div>

  <div class="kpi-grid">
    <div class="kpi"><div class="kpi-val blue" id="kv-pv">—</div><div class="kpi-label">总访问</div><div class="kpi-sub" id="kv-pv-sub">—</div></div>
    <div class="kpi"><div class="kpi-val" id="kv-cr">—</div><div class="kpi-label">完成率</div><div class="kpi-sub" id="kv-cr-sub">完成/开始</div></div>
    <div class="kpi"><div class="kpi-val accent" id="kv-sr">—</div><div class="kpi-label">分享率</div><div class="kpi-sub" id="kv-sr-sub">分享/完成</div></div>
    <div class="kpi"><div class="kpi-val" id="kv-at">—</div><div class="kpi-label">平均答题时长</div><div class="kpi-sub">秒</div></div>
  </div>

  <div class="admin-body">
    <div class="panel half">
      <div class="panel-label">转化漏斗</div>
      <div id="funnel-wrap"></div>
    </div>
    <div class="panel half">
      <div class="panel-label">各题流失分布</div>
      <div class="bar-chart" id="drop-chart"></div>
      <div class="bar-labels" id="drop-labels"></div>
      <div class="bar-insight" id="drop-insight" style="font-size:11px;color:var(--text-faint);margin-top:10px;"></div>
    </div>
    <div class="panel half">
      <div class="panel-label">结果分布</div>
      <div id="ai-dist"></div>
    </div>
    <div class="panel half">
      <div class="panel-label">各题平均思考时长</div>
      <div class="bar-chart" id="time-chart"></div>
      <div class="bar-labels" id="time-labels"></div>
      <div class="bar-insight" id="time-insight" style="font-size:11px;color:var(--text-faint);margin-top:10px;"></div>
    </div>
    <div class="panel half">
      <div class="panel-label">分享方式分布</div>
      <div class="share-pills" id="share-pills"></div>
    </div>
    <div class="panel half">
      <div class="panel-label">选项热力</div>
      <div id="opt-heatmap"></div>
    </div>
    <div class="panel full">
      <div class="panel-label">最近会话记录</div>
      <div id="sess-wrap">
        <table class="sess-table">
          <thead><tr><th>时间</th><th>状态</th><th>结果</th><th>分享</th><th>耗时</th></tr></thead>
          <tbody id="sess-body"></tbody>
        </table>
      </div>
    </div>
    <div class="panel full">
      <div class="panel-label">AI 智能诊断 · 数据驱动迭代建议</div>
      <button class="analyze-btn" id="analyze-btn" onclick="runAnalysis()">📊 用 AI 分析数据，生成迭代建议</button>
      <div class="analysis-box" id="analysis-box">
        <div class="analysis-text" id="analysis-text"></div>
      </div>
    </div>
  </div>
</div>

<script>
// Supabase 配置
const SB_URL = 'https://kzinhbfeilyshsfpfbsm.supabase.co';
const SB_KEY = 'sb_publishable_Iaax24ehcPXHi_3UHK7kFg_Ye32eIKj';
const ADMIN_PWD = 'aiq2024';

const AI_NAMES = ["ChatGPT", "Claude", "Kimi", "DeepSeek", "豆包", "千问"];
const AI_COLORS = ["#10a37f", "#c87c4a", "#4a8bc8", "#4ac8c8", "#e05a7a", "#7ab848"];

let rawEvents = [];

function checkPwd() {
  const v = document.getElementById('pwd-input').value;
  if (v === ADMIN_PWD) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-screen').style.display = 'block';
    loadData();
    setInterval(loadData, 30000);
  } else {
    document.getElementById('pwd-err').textContent = '密码错误';
  }
}

// URL 自动登录
if (new URLSearchParams(location.search).get('admin') === ADMIN_PWD) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('admin-screen').style.display = 'block';
  setTimeout(() => { loadData(); setInterval(loadData, 30000); }, 100);
}

async function loadData() {
  document.getElementById('last-upd').textContent = new Date().toLocaleTimeString('zh-CN');
  
  try {
    const res = await fetch(`${SB_URL}/rest/v1/events?select=*&order=created_at.desc&limit=2000`, {
      headers: {
        'apikey': SB_KEY,
        'Authorization': `Bearer ${SB_KEY}`
      }
    });
    
    if (res.ok) {
      const rows = await res.json();
      rawEvents = rows;
      console.log('加载成功，共', rawEvents.length, '条记录');
      renderDashboard();
    } else {
      console.error('查询失败:', res.status);
      showEmpty();
    }
  } catch (err) {
    console.error('连接失败:', err);
    showEmpty();
  }
}

function showEmpty() {
  document.getElementById('kv-pv').textContent = '0';
  document.getElementById('sess-body').innerHTML = '<tr><td colspan="5" style="padding:40px;text-align:center;">暂无数据</td></tr>';
}

function renderDashboard() {
  const events = rawEvents;
  if (!events.length) { showEmpty(); return; }
  
  // 按 session 分组
  const sessions = {};
  events.forEach(ev => {
    if (!ev.session) return;
    if (!sessions[ev.session]) sessions[ev.session] = [];
    sessions[ev.session].push(ev);
  });
  const sessionList = Object.values(sessions);
  
  // 统计数据
  const totalVisits = sessionList.length;
  const started = sessionList.filter(s => s.some(e => e.event === 'quiz_start')).length;
  const completed = sessionList.filter(s => s.some(e => e.event === 'result_view')).length;
  const shared = sessionList.filter(s => s.some(e => e.event === 'share_click')).length;
  
  document.getElementById('kv-pv').textContent = totalVisits;
  document.getElementById('kv-pv-sub').textContent = started + ' 人开始';
  
  const cr = started ? Math.round(completed / started * 100) : 0;
  const sr = completed ? Math.round(shared / completed * 100) : 0;
  document.getElementById('kv-cr').textContent = cr + '%';
  document.getElementById('kv-cr-sub').textContent = completed + ' / ' + started;
  document.getElementById('kv-sr').textContent = sr + '%';
  document.getElementById('kv-sr-sub').textContent = shared + ' 次分享';
  
  // 平均时长
  const resultEvents = events.filter(e => e.event === 'result_view' && e.data && e.data.total_ms);
  const avgTime = resultEvents.length ? Math.round(resultEvents.reduce((a, e) => a + (e.data.total_ms || 0), 0) / resultEvents.length / 1000) : 0;
  document.getElementById('kv-at').textContent = avgTime || '—';
  
  // 漏斗
  const funnelHtml = `
    <div class="funnel-row"><span class="f-label">落地访问</span><div class="f-track"><div class="f-fill" style="background:var(--blue);width:100%"></div></div><span class="f-val">${totalVisits}人</span></div>
    <div class="funnel-row"><span class="f-label">开始答题</span><div class="f-track"><div class="f-fill" style="background:var(--blue);width:${started/totalVisits*100}%"></div></div><span class="f-val">${started}人 (${Math.round(started/totalVisits*100)}%)</span></div>
    <div class="funnel-row"><span class="f-label">看到结果</span><div class="f-track"><div class="f-fill" style="background:var(--green);width:${completed/totalVisits*100}%"></div></div><span class="f-val">${completed}人 (${Math.round(completed/totalVisits*100)}%)</span></div>
    <div class="funnel-row"><span class="f-label">点击分享</span><div class="f-track"><div class="f-fill" style="background:var(--accent);width:${shared/totalVisits*100}%"></div></div><span class="f-val">${shared}人 (${Math.round(shared/totalVisits*100)}%)</span></div>
  `;
  document.getElementById('funnel-wrap').innerHTML = funnelHtml;
  
  // 结果分布
  const resultCount = new Array(6).fill(0);
  events.filter(e => e.event === 'result_view' && e.data && e.data.winner).forEach(e => {
    const idx = AI_NAMES.indexOf(e.data.winner);
    if (idx >= 0) resultCount[idx]++;
  });
  const totalResults = resultCount.reduce((a, b) => a + b, 0) || 1;
  const aiDistHtml = resultCount.map((c, i) => `
    <div class="ai-row">
      <span class="ai-name">${AI_NAMES[i]}</span>
      <div class="ai-track"><div class="ai-fill" style="background:${AI_COLORS[i]};width:${c/totalResults*100}%"></div></div>
      <span class="ai-pct">${Math.round(c/totalResults*100)}% (${c})</span>
    </div>
  `).join('');
  document.getElementById('ai-dist').innerHTML = aiDistHtml || '<div class="empty-state">暂无结果</div>';
  
  // 分享方式
  const shareMethods = { copy: 0, link: 0, weibo: 0, screenshot: 0 };
  events.filter(e => e.event === 'share_click' && e.data && e.data.method).forEach(e => {
    const m = e.data.method;
    if (shareMethods[m] !== undefined) shareMethods[m]++;
  });
  const sharePillsHtml = `
    <div class="share-pill"><div class="share-pill-val">${shareMethods.copy}</div><div class="share-pill-lbl">复制文字</div></div>
    <div class="share-pill"><div class="share-pill-val">${shareMethods.link}</div><div class="share-pill-lbl">复制链接</div></div>
    <div class="share-pill"><div class="share-pill-val">${shareMethods.weibo}</div><div class="share-pill-lbl">微博</div></div>
    <div class="share-pill"><div class="share-pill-val">${shareMethods.screenshot}</div><div class="share-pill-lbl">截图</div></div>
  `;
  document.getElementById('share-pills').innerHTML = sharePillsHtml;
  
  // 最近会话表格
  const recentSessions = sessionList.slice(-30).reverse();
  const sessHtml = recentSessions.map(s => {
    const pageView = s.find(e => e.event === 'page_view');
    const result = s.find(e => e.event === 'result_view');
    const share = s.find(e => e.event === 'share_click');
    const time = pageView?.created_at ? new Date(pageView.created_at).toLocaleString() : '—';
    const status = result ? '<span class="badge badge-done">完成</span>' : '<span class="badge badge-view">浏览</span>';
    const winner = result?.data?.winner || '—';
    const shareMethod = share?.data?.method || '—';
    const duration = result?.data?.total_ms ? Math.round(result.data.total_ms / 1000) + 's' : '—';
    return `<tr><td>${time}</td><td>${status}</td><td style="color:var(--accent)">${winner}</td><td>${shareMethod}</td><td>${duration}</td></tr>`;
  }).join('');
  document.getElementById('sess-body').innerHTML = sessHtml || '<tr><td colspan="5" style="padding:40px;text-align:center;">暂无数据</td></tr>';
  
  // 各题流失
  const dropByQ = new Array(10).fill(0);
  sessionList.forEach(s => {
    const answers = s.filter(e => e.event === 'q_answer').sort((a, b) => (a.data?.q || 0) - (b.data?.q || 0));
    for (let i = 0; i < answers.length - 1; i++) {
      const q1 = answers[i].data?.q || 0;
      const q2 = answers[i+1].data?.q || 0;
      if (q2 - q1 > 1) {
        for (let j = q1 + 1; j < q2; j++) dropByQ[j]++;
      }
    }
    if (answers.length > 0 && answers.length < 10) {
      const lastQ = answers[answers.length-1].data?.q || 0;
      if (lastQ < 9) dropByQ[lastQ + 1]++;
    }
  });
  const maxDrop = Math.max(...dropByQ, 1);
  let dropHtml = '', dropLabelHtml = '';
  dropByQ.forEach((d, i) => {
    const h = Math.max(4, Math.round(d / maxDrop * 80));
    dropHtml += `<div class="bar-col" style="height:${h}px;background:${d > 5 ? 'var(--red)' : 'var(--accent)'}" data-tip="Q${i+1}: ${d}人流失"></div>`;
    dropLabelHtml += `<span class="bar-lbl">Q${i+1}</span>`;
  });
  document.getElementById('drop-chart').innerHTML = dropHtml;
  document.getElementById('drop-labels').innerHTML = dropLabelHtml;
  const maxDropIdx = dropByQ.indexOf(Math.max(...dropByQ));
  document.getElementById('drop-insight').textContent = maxDropIdx >= 0 ? `⚠️ 流失最严重：Q${maxDropIdx+1}（${dropByQ[maxDropIdx]}人流失）` : '暂无流失数据';
  
  // 各题时长
  const timeByQ = Array.from({ length: 10 }, () => []);
  events.filter(e => e.event === 'q_answer' && e.data && e.data.time_ms).forEach(e => {
    const q = e.data.q || 0;
    if (q >= 0 && q < 10) timeByQ[q].push(e.data.time_ms);
  });
  const avgByQ = timeByQ.map(arr => arr.length ? Math.round(arr.reduce((a, b) => a + b, 0) / arr.length / 1000) : 0);
  const maxTime = Math.max(...avgByQ, 1);
  let timeHtml = '', timeLabelHtml = '';
  avgByQ.forEach((t, i) => {
    const h = Math.max(4, Math.round(t / maxTime * 80));
    timeHtml += `<div class="bar-col" style="height:${h}px;background:var(--blue);opacity:0.7" data-tip="Q${i+1}: ${t}秒"></div>`;
    timeLabelHtml += `<span class="bar-lbl">Q${i+1}</span>`;
  });
  document.getElementById('time-chart').innerHTML = timeHtml;
  document.getElementById('time-labels').innerHTML = timeLabelHtml;
  const maxTimeIdx = avgByQ.indexOf(Math.max(...avgByQ));
  document.getElementById('time-insight').textContent = maxTimeIdx >= 0 ? `⏱️ 思考最久：Q${maxTimeIdx+1}（${avgByQ[maxTimeIdx]}秒）` : '暂无时长数据';
  
  // 选项热力
  const optDist = Array.from({ length: 10 }, () => [0, 0, 0, 0]);
  events.filter(e => e.event === 'q_answer' && e.data && e.data.opt !== undefined).forEach(e => {
    const q = e.data.q || 0;
    const opt = e.data.opt;
    if (q >= 0 && q < 10 && opt >= 0 && opt < 4) optDist[q][opt]++;
  });
  const optHeatHtml = optDist.map((row, qi) => {
    const total = row.reduce((a, b) => a + b, 0) || 1;
    return `<div class="hm-row">
      <span class="hm-q">Q${qi+1}</span>
      ${row.map((n, oi) => `<div class="hm-seg" style="flex:${Math.max(n, 0.5)};background:${['#5a9ae0','#4ec994','#d4a853','#9a7ee0'][oi]};opacity:${0.3 + n/total*0.7}" title="${['A','B','C','D'][oi]}: ${Math.round(n/total*100)}%"></div>`).join('')}
    </div>`;
  }).join('');
  document.getElementById('opt-heatmap').innerHTML = optHeatHtml || '<div class="empty-state">暂无数据</div>';
}

async function runAnalysis() {
  const btn = document.getElementById('analyze-btn');
  const box = document.getElementById('analysis-box');
  const textEl = document.getElementById('analysis-text');
  
  if (!rawEvents.length) {
    alert('暂无数据，请先完成一次测试');
    return;
  }
  
  btn.disabled = true;
  btn.textContent = '分析中...';
  box.style.display = 'block';
  textEl.innerHTML = '正在分析数据...';
  
  const completed = rawEvents.filter(e => e.event === 'result_view').length;
  const started = rawEvents.filter(e => e.event === 'quiz_start').length;
  const cr = started ? Math.round(completed / started * 100) : 0;
  
  const analysis = `📊 当前数据快照

📈 核心指标
• 总访问会话: ${Object.keys(rawEvents.reduce((s,e)=>e.session?(s[e.session]=1,s):s,{})).length}
• 开始答题: ${started} 人
• 完成测试: ${completed} 人
• 完成率: ${cr}%
• 分享次数: ${rawEvents.filter(e => e.event === 'share_click').length}

💡 快速建议
${cr < 50 ? '1. 完成率偏低，建议检查第3-5题是否有歧义或过长\n' : '1. 完成率良好，可以开始优化分享引导\n'}
2. 在结果页增加更明显的分享按钮
3. 考虑在流失较高的题目增加趣味性提示

需要更详细的分析请查看上方各模块数据。`;
  
  textEl.innerHTML = analysis;
  btn.disabled = false;
  btn.textContent = '📊 用 AI 分析数据，生成迭代建议';
}
</script>
