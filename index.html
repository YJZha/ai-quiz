<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>你是哪款AI？— 精神状态鉴定</title>
<style>
:root{
  --bg:#0e0e0f;--surface:#17171a;--surface2:#1f1f24;
  --border:rgba(255,255,255,0.07);--border-hover:rgba(255,255,255,0.15);
  --text:#f0ede8;--text-muted:#888884;--text-faint:#444440;
  --accent:#d4a853;--green:#4ec994;--red:#e05a5a;
  --gpt:#10a37f;--claude:#c87c4a;--kimi:#4a8bc8;
  --deepseek:#4ac8c8;--doubao:#e05a7a;--qwen:#7ab848;
  --font-sans:'PingFang SC','Microsoft YaHei','Helvetica Neue',Arial,sans-serif;
  --font-serif:'Songti SC','SimSun',Georgia,serif;
  --font-mono:'Menlo','Courier New',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--font-sans);font-weight:300;min-height:100vh;overflow-x:hidden;}
.wrap{max-width:680px;margin:0 auto;padding:0 24px 80px;}

/* HERO */
.hero{padding:80px 0 60px;text-align:center;}
.hero-tag{display:inline-block;font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:var(--accent);border:0.5px solid rgba(212,168,83,0.3);padding:5px 14px;border-radius:20px;margin-bottom:28px;}
.hero h1{font-family:var(--font-serif);font-size:clamp(32px,7vw,52px);font-weight:700;line-height:1.2;margin-bottom:18px;}
.hero h1 em{font-style:normal;color:var(--accent);}
.hero p{font-size:14px;color:var(--text-muted);line-height:1.8;max-width:420px;margin:0 auto 36px;}
.start-btn{background:var(--accent);color:#0e0e0f;font-family:var(--font-sans);font-size:14px;font-weight:500;padding:14px 36px;border-radius:40px;border:none;cursor:pointer;letter-spacing:0.05em;}
.ai-chips{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:40px;}
.chip{font-size:11px;padding:4px 12px;border-radius:20px;border:0.5px solid;opacity:0.6;}
.chip-gpt{color:var(--gpt);border-color:var(--gpt);}
.chip-claude{color:var(--claude);border-color:var(--claude);}
.chip-kimi{color:var(--kimi);border-color:var(--kimi);}
.chip-deepseek{color:var(--deepseek);border-color:var(--deepseek);}
.chip-doubao{color:var(--doubao);border-color:var(--doubao);}
.chip-qwen{color:var(--qwen);border-color:var(--qwen);}

/* QUIZ */
.progress-wrap{display:flex;align-items:center;gap:12px;margin-bottom:48px;padding-top:48px;}
.progress-bar{flex:1;height:2px;background:var(--border);border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;width:0%;transition:width 0.4s;}
.progress-label{font-size:12px;color:var(--text-faint);white-space:nowrap;min-width:50px;text-align:right;}
.q-num{font-size:11px;letter-spacing:0.15em;color:var(--accent);margin-bottom:12px;text-transform:uppercase;}
.q-text{font-family:var(--font-serif);font-size:clamp(17px,3.5vw,22px);line-height:1.6;font-weight:600;margin-bottom:28px;}
.opts{display:flex;flex-direction:column;gap:10px;}
.opt{display:flex;align-items:flex-start;gap:14px;padding:16px 20px;background:var(--surface);border:0.5px solid var(--border);border-radius:12px;cursor:pointer;text-align:left;width:100%;}
.opt.selected{border-color:var(--accent);background:rgba(212,168,83,0.06);}
.opt-key{font-size:12px;font-weight:500;color:var(--text-faint);min-width:18px;padding-top:1px;}
.opt.selected .opt-key{color:var(--accent);}
.opt-text{font-size:14px;line-height:1.65;color:var(--text-muted);}
.opt.selected .opt-text{color:var(--text);}
.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:32px;}
.nav-btn{background:none;border:0.5px solid var(--border);color:var(--text-muted);font-family:var(--font-sans);font-size:13px;padding:10px 22px;border-radius:40px;cursor:pointer;}
.nav-btn.primary{background:var(--accent);border-color:var(--accent);color:#0e0e0f;font-weight:500;}
.nav-btn:disabled{opacity:0.3;cursor:not-allowed;}

/* RESULT */
.result-header{text-align:center;margin-bottom:48px;padding-top:48px;}
.result-badge{display:inline-block;font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:var(--text-faint);margin-bottom:16px;}
.result-ai-name{font-family:var(--font-serif);font-size:clamp(36px,8vw,60px);font-weight:700;margin-bottom:8px;line-height:1.1;}
.result-subtitle{font-size:14px;color:var(--text-muted);}
.result-card{background:var(--surface);border:0.5px solid var(--border);border-radius:16px;padding:32px;margin-bottom:20px;}
.result-card-label{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--text-faint);margin-bottom:14px;}
.result-desc{font-size:15px;line-height:1.9;color:var(--text-muted);}
.result-desc strong{color:var(--text);font-weight:500;}
.result-2col{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
@media(max-width:480px){.result-2col{grid-template-columns:1fr;}}
.mini-card{background:var(--surface);border:0.5px solid var(--border);border-radius:12px;padding:20px;}
.mini-card-label{font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--text-faint);margin-bottom:10px;}
.mini-card-text{font-size:13px;line-height:1.7;color:var(--text-muted);}
.score-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.score-ai{font-size:12px;color:var(--text-muted);min-width:70px;}
.score-track{flex:1;height:4px;background:var(--border);border-radius:4px;overflow:hidden;}
.score-fill{height:100%;border-radius:4px;width:0%;transition:width 1s ease;}
.score-val{font-size:11px;color:var(--text-faint);min-width:24px;text-align:right;}

/* AI 点评区域 */
.ai-comment-card{background:linear-gradient(135deg, rgba(212,168,83,0.08) 0%, rgba(212,168,83,0.02) 100%);border:0.5px solid rgba(212,168,83,0.2);border-radius:16px;padding:24px;margin-bottom:20px;position:relative;}
.ai-comment-label{display:inline-flex;align-items:center;gap:6px;background:rgba(212,168,83,0.12);padding:4px 12px;border-radius:20px;font-size:10px;letter-spacing:0.1em;color:var(--accent);margin-bottom:16px;}
.ai-comment-label::before{content:'✨';font-size:12px;}
.ai-comment-text{font-size:15px;line-height:1.8;color:var(--text);font-style:italic;}
.ai-comment-loading{display:flex;align-items:center;gap:12px;color:var(--text-muted);font-size:14px;}
.ai-comment-loading::after{content:'';width:16px;height:16px;border:2px solid var(--accent);border-top-color:transparent;border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.ai-comment-retry{background:none;border:0.5px solid var(--border);color:var(--text-muted);font-size:11px;padding:4px 12px;border-radius:16px;margin-top:12px;cursor:pointer;}
.ai-comment-retry:hover{border-color:var(--accent);color:var(--accent);}

/* SHARE */
.share-section{background:var(--surface);border:0.5px solid var(--border);border-radius:16px;padding:28px;margin-bottom:20px;}
.share-title{font-size:13px;color:var(--text-muted);margin-bottom:16px;text-align:center;}
.share-card{background:var(--bg);border:0.5px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px;text-align:center;}
.share-card .sc-tag{font-size:11px;letter-spacing:0.15em;color:var(--text-faint);margin-bottom:8px;text-transform:uppercase;}
.share-card .sc-name{font-family:var(--font-serif);font-size:28px;font-weight:700;margin-bottom:4px;}
.share-card .sc-sub{font-size:12px;color:var(--text-muted);}
.share-card .sc-url{font-size:10px;color:var(--text-faint);margin-top:10px;}
.share-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.share-btn{padding:12px;background:none;border:0.5px solid var(--border);color:var(--text-muted);font-family:var(--font-sans);font-size:13px;border-radius:10px;cursor:pointer;}
.retry-btn{display:block;width:100%;text-align:center;margin-top:12px;padding:14px;background:none;border:0.5px solid var(--border);color:var(--text-muted);font-family:var(--font-sans);font-size:13px;border-radius:40px;cursor:pointer;}
.footer{text-align:center;padding:40px 0 20px;font-size:11px;color:var(--text-faint);}
.footer a{color:var(--text-faint);text-decoration:none;}
.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface2);border:0.5px solid var(--border-hover);color:var(--text);font-size:13px;padding:10px 20px;border-radius:40px;opacity:0;transition:opacity 0.3s,transform 0.3s;pointer-events:none;z-index:999;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>

var AI_NAMES = ["ChatGPT","Claude","Kimi","DeepSeek","豆包","千问"];
var AI_COLORS = ["#10a37f","#c87c4a","#4a8bc8","#4ac8c8","#e05a7a","#7ab848"];

var answers = [];
var curQ = 0;
var qStartTs = 0;
var quizStartTs = 0;
var winnerResult = null;

// ==================== AI 点评函数 ====================
async function fetchAIComment(winnerName, answersArray, winnerSub) {
  // 将选项索引转换为字母（A/B/C/D）
  var answerLetters = answersArray.map(function(opt) {
    return String.fromCharCode(65 + opt);
  }).join('');
  
  // 构建 prompt
  var prompt = '用户完成了一个AI人格测试，结果如下：\n' +
    '- 人格类型：' + winnerName + '\n' +
    '- 人格描述：' + winnerSub + '\n' +
    '- 用户的10个选项：' + answerLetters + '\n\n' +
    '请用一句幽默、走心、不套路的短评（20-40字），点评这个用户的人格特点。直接输出点评内容，不要加任何前缀或解释。';
  
  try {
    var response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + OPENROUTER_API_KEY,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        model: 'qwen/qwen-2.5-7b-instruct',
        messages: [
          {
            role: 'system',
            content: '你是一个幽默、有洞察力的AI人格解读助手。你的点评要让人会心一笑，感觉被戳中。'
          },
          {
            role: 'user',
            content: prompt
          }
        ],
        max_tokens: 100,
        temperature: 0.8
      })
    });
    
    if (!response.ok) {
      var errorText = await response.text();
      console.error('API 错误:', response.status, errorText);
      throw new Error('API 返回 ' + response.status);
    }
    
    var data = await response.json();
    var comment = data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content;
    
    if (comment) {
      // 清理可能的引号包裹
      comment = comment.replace(/^["']|["']$/g, '').trim();
      return comment;
    } else {
      throw new Error('无效的响应格式');
    }
  } catch (error) {
    console.error('AI 调用失败:', error);
    return null;
  }
}

function displayAIComment(comment) {
  var container = document.getElementById('ai-comment-content');
  if (comment) {
    container.innerHTML = '<div class="ai-comment-text">💬 ' + comment + '</div>' +
      '<button class="ai-comment-retry" onclick="retryAIComment()">🔄 换一句</button>';
    // 上报成功
    track('ai_comment_success', { winner: winnerResult ? winnerResult.name : 'unknown' });
  } else {
    container.innerHTML = '<div class="ai-comment-text" style="color:var(--text-muted);">✨ AI 点评暂时无法生成，你可以刷新页面重试~</div>' +
      '<button class="ai-comment-retry" onclick="retryAIComment()">🔄 重试</button>';
    track('ai_comment_failed', { winner: winnerResult ? winnerResult.name : 'unknown' });
  }
}

function retryAIComment() {
  if (!winnerResult) return;
  var container = document.getElementById('ai-comment-content');
  container.innerHTML = '<div class="ai-comment-loading">AI 正在重新生成...</div>';
  track('ai_comment_retry', { winner: winnerResult.name });
  
  fetchAIComment(winnerResult.name, answers, winnerResult.sub).then(function(comment) {
    displayAIComment(comment);
  }).catch(function() {
    displayAIComment(null);
  });
}

// ==================== 页面渲染函数 ====================
function show(id) {
  document.getElementById('pg-hero').style.display = 'none';
  document.getElementById('pg-quiz').style.display = 'none';
  document.getElementById('pg-result').style.display = 'none';
  document.getElementById(id).style.display = 'block';
}

function renderQ(idx) {
  curQ = idx;
  qStartTs = Date.now();
  var pct = Math.round(idx / 10 * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-label').textContent = (idx + 1) + ' / 10';
  var q = QS[idx];
  var labels = ['A','B','C','D'];
  var html = '<div>';
  html += '<div class="q-num">Q' + (idx+1) + '</div>';
  html += '<div class="q-text">' + q.q + '</div>';
  html += '<div class="opts">';
  for (var i = 0; i < q.o.length; i++) {
    var sel = answers[idx] === i ? ' selected' : '';
    html += '<button class="opt' + sel + '" data-qi="' + idx + '" data-oi="' + i + '">';
    html += '<span class="opt-key">' + labels[i] + '</span>';
    html += '<span class="opt-text">' + q.o[i] + '</span>';
    html += '</button>';
  }
  html += '</div>';
  html += '<div class="nav-row">';
  if (idx === 0) {
    html += '<span></span>';
  } else {
    html += '<button class="nav-btn" id="btn-prev">← 上一题</button>';
  }
  if (idx < 9) {
    var dis = answers[idx] === undefined ? ' disabled' : '';
    html += '<button class="nav-btn primary" id="btn-next"' + dis + '>下一题 →</button>';
  } else {
    var dis2 = answers[idx] === undefined ? ' disabled' : '';
    html += '<button class="nav-btn primary" id="btn-done"' + dis2 + '>查看结果 →</button>';
  }
  html += '</div></div>';
  document.getElementById('q-wrap').innerHTML = html;

  var opts = document.querySelectorAll('.opt');
  for (var j = 0; j < opts.length; j++) {
    opts[j].addEventListener('click', onOptClick);
  }
  var prev = document.getElementById('btn-prev');
  if (prev) prev.addEventListener('click', function(){ renderQ(curQ - 1); });
  var next = document.getElementById('btn-next');
  if (next) next.addEventListener('click', function(){ renderQ(curQ + 1); });
  var done = document.getElementById('btn-done');
  if (done) done.addEventListener('click', showResult);
}

function onOptClick(e) {
  var btn = e.currentTarget;
  var qi = parseInt(btn.getAttribute('data-qi'));
  var oi = parseInt(btn.getAttribute('data-oi'));
  var t = Date.now() - qStartTs;
  answers[qi] = oi;
  track('q_answer', { q: qi, opt: oi, time_ms: t });
  var opts = document.querySelectorAll('.opt');
  for (var i = 0; i < opts.length; i++) opts[i].classList.remove('selected');
  btn.classList.add('selected');
  var next = document.getElementById('btn-next');
  if (next) next.removeAttribute('disabled');
  var done = document.getElementById('btn-done');
  if (done) done.removeAttribute('disabled');
}

function showResult() {
  var scores = [0,0,0,0,0,0];
  for (var qi = 0; qi < QS.length; qi++) {
    var a = answers[qi];
    if (a !== undefined) {
      var sv = QS[qi].s[a];
      for (var si = 0; si < sv.length; si++) scores[si] += sv[si];
    }
  }
  var max = 0, winner = 0;
  for (var i = 0; i < scores.length; i++) { if (scores[i] > max) { max = scores[i]; winner = i; } }
  winnerResult = RESULTS[winner];
  var totalMs = Date.now() - quizStartTs;
  track('result_view', { winner: AI_NAMES[winner], scores: scores.join(','), total_ms: totalMs });

  // 渲染基础结果
  document.getElementById('r-name').textContent = winnerResult.name;
  document.getElementById('r-name').style.color = winnerResult.color;
  document.getElementById('r-sub').textContent = winnerResult.sub;
  document.getElementById('r-desc').innerHTML = winnerResult.desc;
  document.getElementById('r-other').textContent = '"' + winnerResult.other + '"';
  document.getElementById('r-inner').textContent = '"' + winnerResult.inner + '"';
  document.getElementById('r-share-name').textContent = winnerResult.name;
  document.getElementById('r-share-name').style.color = winnerResult.color;
  document.getElementById('r-share-sub').textContent = winnerResult.sub;

  var sorted = scores.map(function(s,i){return{s:s,i:i};}).sort(function(a,b){return b.s-a.s;});
  var barsHtml = '';
  for (var k = 0; k < sorted.length; k++) {
    var s = sorted[k].s, ii = sorted[k].i;
    var w = max ? Math.round(s/max*100) : 0;
    barsHtml += '<div class="score-row">';
    barsHtml += '<span class="score-ai">' + AI_NAMES[ii] + '</span>';
    barsHtml += '<div class="score-track"><div class="score-fill" id="sf'+ii+'" style="background:'+AI_COLORS[ii]+';width:0%"></div></div>';
    barsHtml += '<span class="score-val">' + s + '</span></div>';
    (function(elId, width){
      setTimeout(function(){ var el=document.getElementById(elId); if(el) el.style.width=width+'%'; }, 200);
    })('sf'+ii, w);
  }
  document.getElementById('r-bars').innerHTML = barsHtml;
  
  // 显示结果页面
  show('pg-result');
  
  // 异步调用 AI 点评
  fetchAIComment(winnerResult.name, answers, winnerResult.sub).then(function(comment) {
    displayAIComment(comment);
  }).catch(function() {
    displayAIComment(null);
  });
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2500);
}

// ==================== 事件绑定 ====================
document.getElementById('btn-start').addEventListener('click', function() {
  answers = [];
  quizStartTs = Date.now();
  track('quiz_start');
  show('pg-quiz');
  renderQ(0);
});

document.getElementById('btn-copy').addEventListener('click', function() {
  if (!winnerResult) return;
  track('share_click', { method: 'copy', winner: winnerResult.name });
  var url = location.href.split('?')[0];
  var txt = '我做了一个AI人格测试，结果是【' + winnerResult.name + '】——' + winnerResult.sub + '\n\n' + winnerResult.desc.replace(/<[^>]+>/g,'') + '\n\n你也来测测：' + url;
  navigator.clipboard.writeText(txt).then(function(){ showToast('已复制，去粘贴吧！'); });
});

document.getElementById('btn-link').addEventListener('click', function() {
  if (!winnerResult) return;
  track('share_click', { method: 'link', winner: winnerResult.name });
  navigator.clipboard.writeText(location.href.split('?')[0]).then(function(){ showToast('链接已复制'); });
});

document.getElementById('btn-weibo').addEventListener('click', function() {
  if (!winnerResult) return;
  track('share_click', { method: 'weibo', winner: winnerResult.name });
  var url = location.href.split('?')[0];
  window.open('https://service.weibo.com/share/share.php?title=' + encodeURIComponent('我的AI人格是【' + winnerResult.name + '】' + winnerResult.sub + ' 快来测 → ' + url));
});

document.getElementById('btn-screenshot').addEventListener('click', function() {
  track('share_click', { method: 'screenshot', winner: winnerResult ? winnerResult.name : '' });
  showToast('长按页面 → 截图 → 发给好友');
});

document.getElementById('btn-retry').addEventListener('click', function() {
  track('retry_click');
  answers = [];
  quizStartTs = Date.now();
  show('pg-quiz');
  renderQ(0);
});

// 将 retryAIComment 挂载到 window 以便 onclick 调用
window.retryAIComment = retryAIComment;
</script>
